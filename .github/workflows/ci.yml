# CI: architecture-boundary tests + domain characterization tests.
#
# The domain tests compile the PURE production sources (source-linked) on
# net8 -- no AutoCAD needed -- and pin the .framespec format, every legacy
# migration, distance parsing, and the peg standards. The arch tests are
# dependency-free text scans guarding the generator/editor boundary.
#
# The plugin itself (net48 + ObjectARX) still cannot fully build in CI:
# the SDK is a licensed local install referenced by absolute path, and
# acdbmgdbrep (BRep -- used by scribe annotation, shop maps, face picking)
# ships only with it. Plugin compilation stays a local gate.
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  architecture-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Architecture boundary tests
        run: dotnet test tests/TimberDraw.Architecture.Tests --nologo
      - name: Domain characterization tests
        run: dotnet test tests/TimberDraw.Domain.Tests --nologo
